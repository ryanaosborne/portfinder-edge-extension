<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PortFinder Hover — Options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
      padding: 40px 24px;
      min-height: 100vh;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #89dceb;
      margin: 0 0 6px;
    }

    p.subtitle {
      color: #a6adc8;
      font-size: 13px;
      margin: 0 0 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
      margin-bottom: 6px;
    }

    input[type="url"], input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="url"]:focus, input[type="text"]:focus {
      border-color: #4a9eff;
    }

    .hint {
      font-size: 12px;
      color: #6c7086;
      margin-top: 5px;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a9eff;
      color: #1e1e2e;
      transition: background 0.15s;
    }
    button:hover { background: #6ab0ff; }
    button:active { background: #3a8eef; }

    #btn-test {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
    }
    #btn-test:hover { background: #3d3f56; }

    #status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
      margin-top: 14px;
    }
    #status.ok  { background: #1e3a2e; color: #a6e3a1; border: 1px solid #2a5a3e; }
    #status.err { background: #3a1e2e; color: #f38ba8; border: 1px solid #5a2a3e; }
    #status.info { background: #1e2a3a; color: #89dceb; border: 1px solid #2a3a5a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PortFinder Hover</h1>
    <p class="subtitle">Configure the URL of your PortFinder backend. The extension will query it when you hover over an IP or MAC address on any page.</p>

    <form id="form">
      <label for="url">PortFinder API base URL</label>
      <input id="url" type="text" placeholder="http://10.0.0.1:5000" autocomplete="off" spellcheck="false" />
      <p class="hint">Do not include a trailing slash or path. Example: <code>http://portfinder.local:5000</code></p>

      <div class="btn-row">
        <button type="submit">Save</button>
        <button type="button" id="btn-test">Test connection</button>
      </div>

      <div id="status"></div>
    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
